{% extends 'base.html' %}
{% block title %}Edit Course{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <span class="breadcrumb-sep">›</span>
    <a href="{{ url_for('course_detail', course_id=course.id) }}">{{ course.title }}</a>
    <span class="breadcrumb-sep">›</span>
    <span>Edit</span>
</div>

<div class="page-header">
    <h1>✏️ Edit Course</h1>
</div>

<div class="card" style="max-width: 700px;">
    <form method="POST" action="{{ url_for('edit_course', course_id=course.id) }}" enctype="multipart/form-data">
        <div class="form-group">
            <label class="form-label" for="title">Course Title *</label>
            <input type="text" id="title" name="title" class="form-input" value="{{ course.title }}" required>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="category">Category / Tag</label>
                <input type="text" id="category" name="category" class="form-input" value="{{ course.category }}" placeholder="e.g. Programming, Arts">
            </div>
            <div class="form-group">
                <label class="form-label" for="image">Course Image Cover <span style="font-size: 0.8rem; font-weight: normal; color: var(--text-muted);">(Optional - Leave blank to keep current)</span></label>
                <input type="file" id="image" name="image" class="form-input" accept="image/*">
            </div>
        </div>
        {% if course.image_url %}
        <div style="margin-bottom: 1rem;">
            <img src="{{ course.image_url }}" alt="Current Image" style="width: 150px; height: 100px; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border);">
        </div>
        {% endif %}
        
        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" name="description" class="form-textarea" rows="4">{{ course.description }}</textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="department_id">Department *</label>
                <select id="department_id" name="department_id" class="form-select" required>
                    {% for dept in departments %}
                    <option value="{{ dept.id }}" {% if course.department_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <!-- Trainer selection removed; preserved on server side -->
                <input type="hidden" name="admin_id" value="{{ course.admin_id }}">
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-checkbox">
                <input type="checkbox" name="is_published" value="1" {% if course.is_published %}checked{% endif %}>
                Published (visible to employees)
            </label>
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('course_detail', course_id=course.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
