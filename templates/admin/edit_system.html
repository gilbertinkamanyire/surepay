{% extends 'base.html' %}
{% block title %}Edit system{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <span class="breadcrumb-sep">›</span>
    <a href="{{ url_for('manage_systems') }}">systems</a>
    <span class="breadcrumb-sep">›</span>
    <span>Edit</span>
</div>

<div class="page-header">
    <h1>✏️ Edit system</h1>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST">
        <div class="form-group">
            <label class="form-label" for="name">system Name *</label>
            <input type="text" id="name" name="name" class="form-input" value="{{ cat.name }}" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" name="description" class="form-textarea" rows="4">{{ cat.description }}</textarea>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('manage_systems') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
