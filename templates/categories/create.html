{% extends 'base.html' %}
{% block title %}Add New category{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <span class="breadcrumb-sep">›</span>
    <span>Add New category</span>
</div>

<div class="page-header">
    <h1>📚 Add New category</h1>
    <p>Add a new training category to the platform</p>
</div>

<div class="card" style="max-width: 700px;">
    <form method="POST" action="{{ url_for('create_category') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label class="form-label" for="title">category Title *</label>
            <input type="text" id="title" name="title" class="form-input" 
                   placeholder="e.g. Introduction to Applied ICT" required autofocus>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="category">category / Tag</label>
                <input type="text" id="category" name="category" class="form-input" placeholder="e.g. Programming, Arts">
            </div>
            <div class="form-group">
                <label class="form-label" for="image">category Image Cover <span style="font-size: 0.8rem; font-weight: normal; color: var(--text-muted);">(Optional)</span></label>
                <input type="file" id="image" name="image" class="form-input" accept="image/*">
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" name="description" class="form-textarea" rows="4"
                      placeholder="Describe what employees will learn in this category..."></textarea>
        </div>
        
        <div class="form-group">
            <label class="form-checkbox">
                <input type="checkbox" name="is_published" value="1">
                Publish immediately (employees can see this category)
            </label>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="system_id">system *</label>
                <select id="system_id" name="system_id" class="form-select" required>
                    <option value="">-- Select system --</option>
                    {% for cat in systems %}
                    <option value="{{ cat.id }}" {% if preselect_cat == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <input type="hidden" name="admin_id" value="{{ preselect_admin or session.user_id }}">
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Add category</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock content %}
