{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block body_class %}page-auth{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">📚</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your SurePay account</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label" for="username">Username or Email</label>
                <input type="text" id="username" name="username" class="form-input" 
                       placeholder="Enter username or email" required {% if not saved_username %}autofocus{% endif %}
                       autocomplete="username" value="{{ saved_username }}">
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label class="form-label" for="password" style="margin-bottom: 0;">Password</label>
                    <a href="{{ url_for('forgot_password') }}" style="font-size: 0.85rem;">Forgot password?</a>
                </div>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" class="form-input" 
                           placeholder="Enter password" required {% if saved_username %}autofocus{% endif %}
                           autocomplete="current-password" style="padding-right: 40px;">
                    <button type="button" onclick="var x=document.getElementById('password'); x.type=(x.type==='password'?'text':'password');" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.2rem;">
                        <i class='bx bx-show'></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
        </form>
        
        <div class="auth-divider">or</div>
        
        <p class="text-center" style="font-size: 0.85rem;">
            Don't have an account? 
            <a href="{{ url_for('register') }}"><strong>Create one free</strong></a>
        </p>
        
    </div>
</div>
{% endblock %}
