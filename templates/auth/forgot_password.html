{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🔑</div>
            <h1>Forgot account?</h1>
            <p>Send a reset link to your email</p>
        </div>
        
        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="form-group">
                <label class="form-label" for="email">Account Email</label>
                <input type="email" id="email" name="email" class="form-input" 
                       placeholder="Enter your email address" required autofocus>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 1.5rem;">Request Reset</button>
        </form>

        <div class="text-center mt-3" style="margin-top: 1.5rem;">
            Remembered? <a href="{{ url_for('login') }}"><strong>Back to sign in</strong></a>
        </div>
    </div>
</div>
{% endblock %}
