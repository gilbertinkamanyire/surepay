{% extends 'base.html' %}
{% block title %}Accept Terms{% endblock %}
{% block body_class %}page-auth{% endblock %}

{% block content %}
<div style="max-width: 760px; margin: 0 auto;">
    <div class="card">
        <div class="card-header">
            <div>
                <h2 style="display:flex; align-items:center; gap:0.5rem;"><i class='bx bxs-file' style="color:var(--secondary-accent);"></i> Terms &amp; Conditions</h2>
                <p style="font-size:0.85rem; color:var(--text-muted); margin:0.25rem 0 0;">
                    Please review and accept our terms before continuing. (Version {{ terms_version }})
                </p>
            </div>
        </div>

        <div class="terms-content" style="max-height: 320px; overflow-y: auto; padding: 0.5rem 0.25rem; border:1px solid var(--border); border-radius: var(--radius); padding: 1rem;">{{ terms_content }}</div>

        <form method="POST" action="{{ url_for('accept_terms') }}">
            <label class="terms-accept-box">
                <input type="checkbox" name="accept" value="1">
                <span>I have read and agree to the {{ platform.company_name }} Terms &amp; Conditions.</span>
            </label>
            <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
                <button type="submit" class="btn btn-primary btn-lg"><i class='bx bx-check'></i> Accept &amp; Continue</button>
                <a href="{{ url_for('logout') }}" class="btn btn-outline btn-lg">I don't agree</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
